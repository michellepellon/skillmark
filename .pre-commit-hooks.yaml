- id: skillplane
  name: skillplane check
  entry: skillplane check --no-score --quiet --fail-on errors
  language: system
  files: '(?i)skill\.md$'
  pass_filenames: false

- id: skillplane-fix
  name: skillplane fix
  entry: skillplane fix
  language: system
  files: '(?i)skill\.md$'
  pass_filenames: false
  stages: [manual]
