- id: skillmark
  name: skillmark check
  entry: skillmark check --no-score --quiet --fail-on errors
  language: system
  files: '(?i)skill\.md$'
  pass_filenames: false

- id: skillmark-fix
  name: skillmark fix
  entry: skillmark fix
  language: system
  files: '(?i)skill\.md$'
  pass_filenames: false
  stages: [manual]
